<div class="app-layout" [class.sidebar-collapsed]="sidebarCollapsed">
  @if (!sidebarCollapsed) {
    <button class="sidebar-backdrop" type="button" (click)="closeSidebar()" aria-label="Cerrar menú"></button>
  }

  <app-sidebar [collapsed]="sidebarCollapsed" (closeSidebar)="closeSidebar()"></app-sidebar>

  <main class="main-content">
    <app-topbar (toggleSidebarEvent)="toggleSidebar()"></app-topbar>

    <section class="content-wrapper">
      <router-outlet></router-outlet>
    </section>
  </main>
</div>
