<section class="register-layout">
  <article class="register-card glass-panel">
    <header class="register-header">
      <span class="eyebrow">Registro</span>
      <h2>Crear cuenta</h2>
    </header>

    <form class="register-form" [formGroup]="form" (ngSubmit)="submit()">
      <label>
        <span>Nombre</span>
        <input
          type="text"
          formControlName="nombre"
          placeholder="Nombre y apellidos"
          autocomplete="name"
          [class.input-invalid]="nombreError()"
        />
        @if (nombreError(); as message) {
          <small class="field-error">{{ message }}</small>
        }
      </label>

      <label>
        <span>Correo</span>
        <input
          type="email"
          formControlName="email"
          placeholder="operador@aquasense.io"
          autocomplete="email"
          [class.input-invalid]="emailError()"
        />
        @if (emailError(); as message) {
          <small class="field-error">{{ message }}</small>
        }
      </label>

      <label>
        <span>Contrasena</span>
        <input
          type="password"
          formControlName="password"
          placeholder="Ej: Agua123!"
          autocomplete="new-password"
          [class.input-invalid]="passwordError()"
        />
        @if (passwordError(); as message) {
          <small class="field-error">{{ message }}</small>
        }

        <ul class="password-requirements" aria-label="Requisitos de contrasena">
          <li [class.is-met]="passwordHasMinLength()">Minimo 8 caracteres</li>
          <li [class.is-met]="passwordHasLowerAndUpper()">Mayuscula y minuscula</li>
          <li [class.is-met]="passwordHasNumber()">Un numero</li>
          <li [class.is-met]="passwordHasSymbol()">Un simbolo: &#64;$!%*?&amp;</li>
        </ul>
      </label>

      <div class="strength-meter">
        <span>Fortaleza</span>
        <strong [attr.data-tone]="passwordStrength()">{{ passwordStrength() }}</strong>
      </div>

      <div class="register-actions">
        <button type="submit" class="submit-button" [disabled]="isSubmitting()">
          @if (isSubmitting()) {
            <span class="button-loader"></span>
            <span>Creando...</span>
          } @else {
            <span>Crear cuenta</span>
          }
        </button>
      </div>
    </form>

    <p class="feedback" [attr.data-tone]="feedbackTone()">{{ feedback() }}</p>

    <footer>
      <span>Ya tienes acceso?</span>
      <a routerLink="/login">Iniciar sesion</a>
    </footer>
  </article>
</section>
