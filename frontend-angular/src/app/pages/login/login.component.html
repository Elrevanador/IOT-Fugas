<section class="auth-page auth-page--centered">
  <article class="auth-card glass-panel">
    <header class="auth-header">
      <span class="eyebrow">Acceso</span>
      <h2>Iniciar sesión</h2>
    </header>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <label>
        <span>Correo o username</span>
        <input
          type="text"
          formControlName="email"
          placeholder="operador@aquasense.io o operador_01"
          autocomplete="username"
        />
        <small>{{ emailHint() }}</small>
      </label>

      <label class="password-field">
        <span>Contraseña</span>

        <div class="password-field__control">
          <input
            [type]="showPassword() ? 'text' : 'password'"
            formControlName="password"
            placeholder="Tu acceso seguro"
          />

          <button
            type="button"
            class="password-field__toggle"
            (click)="togglePasswordVisibility()"
            [attr.aria-label]="showPassword() ? 'Ocultar contraseña' : 'Mostrar contraseña'"
          >
            <i [class]="showPassword() ? 'fa-solid fa-eye-slash' : 'fa-solid fa-eye'" aria-hidden="true"></i>
          </button>
        </div>
      </label>

      <button type="submit" class="submit-button" [disabled]="isSubmitting()">
        @if (isSubmitting()) {
          <span class="button-loader"></span>
          <span>Validando credenciales...</span>
        } @else {
          <span>Entrar al sistema</span>
        }
      </button>
    </form>

    <p class="feedback" [attr.data-tone]="feedbackTone()">
      {{ feedback() }}
    </p>

    <div class="auth-trust">
      <div class="auth-trust__item">
        <span></span>
        <p>Acceso seguro con JWT</p>
      </div>

      <div class="auth-trust__item">
        <span></span>
        <p>Sincronización en tiempo real (SSE)</p>
      </div>
    </div>

    <footer>
      <span>¿No tienes acceso?</span>
      <a routerLink="/register">Crear cuenta</a>
    </footer>
  </article>
</section>
